name: release

# PHP/Composer has no compiled artifact — Packagist serves a zip of the tagged
# commit. This validates the manifest and produces that same zip (via git
# archive) for inspection, attaching it on a v* tag. Publishing to Packagist
# (the tag + a one-time webhook) is a separate, later step — no tokens here.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - run: composer validate --strict
      - run: git archive --format=zip -o ipapi-php.zip HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: php-package
          path: ipapi-php.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" ipapi-php.zip --title "$GITHUB_REF_NAME" --generate-notes \
            || gh release upload "$GITHUB_REF_NAME" ipapi-php.zip --clobber
